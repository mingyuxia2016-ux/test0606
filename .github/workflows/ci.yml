name: CI

on:
  push:
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    env:
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      DEEPSEEK_MODEL: deepseek-chat
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run maintained API tests
        id: base_tests
        continue-on-error: true
        run: |
          mkdir -p reports
          pytest tests --junitxml=reports/junit-base.xml

      - name: Export OpenAPI spec
        run: python scripts/export_openapi.py

      - name: Generate API tests with DeepSeek
        run: python scripts/generate_ai_tests.py

      - name: Run DeepSeek-generated API tests
        id: ai_tests
        continue-on-error: true
        run: |
          mkdir -p reports
          if [ -f generated_tests/test_ai_generated_api.py ]; then
            pytest generated_tests --junitxml=reports/junit-ai.xml
          else
            echo "No generated tests found. Skipping AI-generated test execution."
          fi

      - name: Summarize failures with DeepSeek
        if: steps.base_tests.outcome == 'failure' || steps.ai_tests.outcome == 'failure'
        run: python scripts/ai_test_summary.py

      - name: Report AI-generated test status
        if: steps.ai_tests.outcome == 'failure'
        run: |
          echo "DeepSeek-generated tests failed. See reports/junit-ai.xml in api-test-artifacts."
          echo "This demo treats generated AI tests as advisory so unstable generated code does not block CI."

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-artifacts
          path: |
            reports/
            generated_tests/

      - name: Fail workflow when tests fail
        if: steps.base_tests.outcome == 'failure'
        run: exit 1
